name: Credentialed Sandbox Preflight

on:
  workflow_dispatch:
    inputs:
      target:
        description: Credential target to require
        required: true
        default: all
        type: choice
        options:
          - all
          - telegram
          - bitrix24

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run read-only credentialed preflight
        env:
          PUBLIC_BASE_URL: https://saleops.duckdns.org
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_APPROVAL_CHAT_ID: ${{ secrets.TELEGRAM_APPROVAL_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          TELEGRAM_DRY_RUN: "true"
          BITRIX24_WEBHOOK_URL: ${{ secrets.BITRIX24_WEBHOOK_URL }}
          BITRIX24_DRY_RUN: "true"
          INTEGRATION_WORKER_ENABLED: "false"
        run: |
          set -euo pipefail
          evidence_dir="artifacts/credentialed-sandbox-preflight"
          mkdir -p "$evidence_dir"

          case "${{ inputs.target }}" in
            all)
              args=(--require-credentials)
              ;;
            telegram)
              args=(--require-target telegram)
              ;;
            bitrix24)
              args=(--require-target bitrix24)
              ;;
            *)
              echo "Unknown target: ${{ inputs.target }}"
              exit 2
              ;;
          esac

          set +e
          python scripts/credentialed_sandbox_preflight.py \
            --output-dir "$evidence_dir" \
            "${args[@]}" | tee "$evidence_dir/credentialed-sandbox-preflight.console.txt"
          status=${PIPESTATUS[0]}
          set -e

          python - <<'PY'
          import os
          import pathlib
          import sys

          secret_names = [
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_APPROVAL_CHAT_ID",
              "TELEGRAM_WEBHOOK_SECRET",
              "BITRIX24_WEBHOOK_URL",
          ]
          secret_values = [os.environ.get(name) for name in secret_names if os.environ.get(name)]
          evidence_dir = pathlib.Path("artifacts/credentialed-sandbox-preflight")
          leaked_files = []
          for path in evidence_dir.glob("*"):
              if not path.is_file():
                  continue
              data = path.read_text(encoding="utf-8", errors="ignore")
              if any(secret in data for secret in secret_values):
                  leaked_files.append(path.name)

          if leaked_files:
              print("secret leakage detected in sanitized preflight artifacts: " + ", ".join(leaked_files))
              sys.exit(1)

          print("secret leakage check passed")
          PY

          {
            echo "## Credentialed Sandbox Preflight"
            echo
            echo "Target: ${{ inputs.target }}"
            echo
            echo '```text'
            cat "$evidence_dir/credentialed-sandbox-preflight.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - name: Upload sanitized preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: credentialed-sandbox-preflight-${{ inputs.target }}
          path: artifacts/credentialed-sandbox-preflight/
          if-no-files-found: error
