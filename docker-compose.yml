services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiops"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://aiops:aiops@postgres:5432/aiops
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-64}
      TOP_K: ${TOP_K:-5}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_APPROVAL_CHAT_ID: ${TELEGRAM_APPROVAL_CHAT_ID:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-true}
      GOOGLE_DRIVE_CREDENTIALS_JSON: ${GOOGLE_DRIVE_CREDENTIALS_JSON:-}
      GOOGLE_DRIVE_DRY_RUN: ${GOOGLE_DRIVE_DRY_RUN:-true}
      BITRIX24_WEBHOOK_URL: ${BITRIX24_WEBHOOK_URL:-}
      BITRIX24_DRY_RUN: ${BITRIX24_DRY_RUN:-true}
      INTEGRATION_MAX_ATTEMPTS: ${INTEGRATION_MAX_ATTEMPTS:-3}
      INTEGRATION_RETRY_DELAY_SECONDS: ${INTEGRATION_RETRY_DELAY_SECONDS:-300}
      INTEGRATION_WORKER_ENABLED: ${INTEGRATION_WORKER_ENABLED:-false}
      INTEGRATION_WORKER_INTERVAL_SECONDS: ${INTEGRATION_WORKER_INTERVAL_SECONDS:-60}
      INTEGRATION_WORKER_BATCH_SIZE: ${INTEGRATION_WORKER_BATCH_SIZE:-10}
      APP_VERSION: ${APP_VERSION:-0.2.0}
      GIT_SHA: ${GIT_SHA:-local}
      DEPLOY_ENVIRONMENT: ${DEPLOY_ENVIRONMENT:-local}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
