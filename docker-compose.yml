services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiops"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://aiops:aiops@postgres:5432/aiops
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-64}
      TOP_K: ${TOP_K:-5}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_APPROVAL_CHAT_ID: ${TELEGRAM_APPROVAL_CHAT_ID:-}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-true}
      BITRIX24_WEBHOOK_URL: ${BITRIX24_WEBHOOK_URL:-}
      BITRIX24_DRY_RUN: ${BITRIX24_DRY_RUN:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
